<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>論證手法小挑戰 · 花瓣課堂</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            font-family: 'Segoe UI', '微軟正黑體', 'PingFang HK', 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f9f2e7 0%, #fff3e0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            width: 1300px;
            max-width: 100%;
            background: rgba(255, 240, 220, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 0 0 2px #fdd9b5 inset;
            padding: 24px 30px 30px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        /* 標題行 + 控制條 */
        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            background: #ffe9ce;
            border-radius: 60px;
            padding: 10px 30px;
            box-shadow: 0 6px 0 #cbad7e;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #6b3f1f;
            text-shadow: 2px 2px 0 #ffcf9c;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.2;
        }
        .group-badge {
            background: #a5672f;
            color: #ffefd0;
            border-radius: 40px;
            padding: 8px 22px;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: inset 0 -3px 0 #523e1a;
        }
        .timer-area {
            position: relative;   /* 為了絕對定位 +10秒 提示 */
            display: flex;
            align-items: center;
            gap: 15px;
            background: #2e241a;
            border-radius: 50px;
            padding: 5px 20px 5px 15px;
        }
        .timer {
            font-family: 'Courier New', monospace;
            font-size: 2.6rem;
            font-weight: 700;
            color: #fdd68b;
            background: #1f160f;
            padding: 5px 18px;
            border-radius: 40px;
            letter-spacing: 5px;
            text-shadow: 0 0 6px gold;
        }
        .plus-ten {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%) translateX(10px);
            background: #ffaa33;
            color: #3d1f00;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 6px 16px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #9f6a3a;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            white-space: nowrap;
            border: 2px solid #ffd966;
            z-index: 30;
        }
        .plus-ten.show {
            opacity: 1;
            transform: translateY(-50%) translateX(-10px);
        }
        .continue-btn {
            background: #74a57f;
            border: none;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 8px 30px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 0 #3d5e45, 0 4px 12px black;
            transition: 0.07s;
            border: 2px solid #c3e3a9;
        }
        .continue-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #3d5e45;
        }
        .continue-btn.hidden {
            display: none;
        }
        /* 暫停橫幅 */
        .pause-banner {
            background: #c94242;
            color: #ffecaa;
            font-size: 2.6rem;
            font-weight: 800;
            text-align: center;
            padding: 15px;
            border-radius: 50px;
            letter-spacing: 4px;
            box-shadow: 0 0 0 4px #ffbaba;
            margin: 5px 0;
        }
        .pause-banner.hidden {
            display: none;
        }
        /* 句子框 長寬比4:1，字體特大，文字左對齊 */
        .sentence-box {
            width: 100%;
            aspect-ratio: 4 / 1;
            background: #fffcf0;
            border: 5px solid #d9b382;
            border-radius: 50px;
            box-shadow: inset 0 0 20px #bc8f5a, 0 12px 0 #8b5e2e;
            display: flex;
            align-items: center;
            justify-content: flex-start;   /* 左對齊 */
            padding: 20px 40px;
            font-size: 2.8rem;
            font-weight: 600;
            color: #442f1f;
            text-align: left;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
            transition: background 0.2s;
            margin: 15px 0 5px;
        }
        .sentence-text {
            z-index: 5;
            max-width: 100%;
            word-break: break-word;
        }
        /* 花瓣/交叉浮層 */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            z-index: 20;
            pointer-events: none;
        }
        .big-emojis {
            font-size: 5rem;
            line-height: 1.2;
            filter: drop-shadow(0 8px 6px #b35e00);
        }
        .wrong-msg {
            background: #a03333;
            color: #fffeca;
            font-size: 2.8rem;
            padding: 0.5rem 2.5rem;
            border-radius: 4rem;
            border: 3px solid #ffbaba;
            white-space: nowrap;
        }
        /* 底部按鈕組 */
        .button-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .arg-btn {
            flex: 1 1 200px;
            min-width: 200px;
            background: #ffc38b;
            border: 4px solid #f5a55b;
            color: #3e280f;
            font-size: 2.6rem;
            font-weight: 800;
            padding: 20px 0;
            border-radius: 60px;
            box-shadow: 0 9px 0 #9f6a3a, 0 6px 12px black;
            cursor: pointer;
            transition: all 0.06s linear;
            text-align: center;
            letter-spacing: 2px;
        }
        .arg-btn:active {
            transform: translateY(7px);
            box-shadow: 0 2px 0 #9f6a3a;
        }
        .arg-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.6);
            transform: translateY(4px);
            box-shadow: 0 5px 0 #7b4f28;
        }
        /* 開始組按鈕 */
        .start-group-btn {
            background: #ca984b;
            color: #2b1d0b;
            font-size: 2.8rem;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            padding: 20px 50px;
            box-shadow: 0 10px 0 #6e4a1f, 0 6px 18px black;
            cursor: pointer;
            transition: 0.05s;
            letter-spacing: 6px;
            margin: 10px 0 15px;
            width: fit-content;
            align-self: center;
        }
        .start-group-btn:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #6e4a1f;
        }
        /* 花瓣雨動畫 - 加速版 */
        .petal {
            position: absolute;
            pointer-events: none;
            font-size: 2.5rem;
            animation: fall 0.7s forwards ease-in;
            z-index: 100;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            70% { opacity: 0.9; }
            100% { transform: translateY(200px) rotate(300deg); opacity: 0; }
        }
        .hidden {
            display: none !important;
        }
        .inline-flex {
            display: inline-flex;
        }
        /* 進度資訊 */
        .progress-info {
            font-size: 2.2rem;
            color: #714723;
            font-weight: 600;
            background: #fdebc8;
            border-radius: 40px;
            padding: 5px 25px;
        }
        .top-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <!-- 標題行 -->
    <div class="header-row">
        <h1>🌸 判斷以下句子運用了甚麼論證手法 🌸</h1>
        <div class="top-bar">
            <div class="group-badge" id="groupName">第一組 · 示範</div>
            <div class="timer-area">
                <span class="timer" id="timerDisplay">00:00</span>
                <span id="plusTenMsg" class="plus-ten">+10秒</span>
            </div>
            <button class="continue-btn hidden" id="continueBtn">▶ 繼續</button>
        </div>
    </div>
    <!-- 暫停橫幅 -->
    <div id="pauseBanner" class="pause-banner hidden">⏸️ 計時停止 · 老師講解 ⏸️</div>

    <!-- 句子長方形 (左對齊) -->
    <div class="sentence-box" id="sentenceBox">
        <div class="sentence-text" id="sentenceText">準備好開始第一組了嗎？</div>
        <div id="feedbackOverlay" class="feedback-overlay hidden"></div>
    </div>

    <!-- 開始按鈕 & 進度 -->
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <button class="start-group-btn" id="startGroupBtn">開始 第一組</button>
        <div class="progress-info" id="progressDisplay">0 / 9</div>
    </div>

    <!-- 四個論證按鈕 -->
    <div class="button-panel" id="buttonPanel">
        <button class="arg-btn" data-method="比喻論證">比喻論證</button>
        <button class="arg-btn" data-method="舉例論證">舉例論證</button>
        <button class="arg-btn" data-method="正反論證">正反論證</button>
        <button class="arg-btn" data-method="引用論證">引用論證</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 數據源 ----------
        const allSentences = [
            { text: '為學要如金字塔，要能廣大要能高。', method: '比喻論證' },
            { text: '學習有如登山，不能一步登天。', method: '比喻論證' },
            { text: '我們要保存珍貴的文化遺產，但也要捨棄部分過時的文化遺產。文化遺產如同舊宅子一樣，內有可用的東西，也有糟粕廢物。', method: '比喻論證' },
            { text: '理想是人生的指路明燈，沒有理想，人生就如同航船失去了羅盤，在茫茫大海中迷失方向。', method: '比喻論證' },
            { text: '讀書如同咀嚼食物，不能囫圇吞棗，必須細細品味，才能吸收其中的養分。', method: '比喻論證' },
            { text: '李白說：「天生我材必有用。」可見每個人都有其用處，我們不能驕傲自大，也不應妄自菲薄。', method: '引用論證' },
            { text: '孟子說：「君子有終身之憂。」越是聖賢、豪傑，他負的責任便越是重大。', method: '引用論證' },
            { text: '孔子說：「學而不思則罔，思而不學則殆。」這說明了思考與學習必須並重。', method: '引用論證' },
            { text: '俗話說：「世上無難事，只怕有心人。」只要我們肯下功夫，任何困難都能迎刃而解。', method: '引用論證' },
            { text: '勤奮的人，雖然天資平平，也能勤能補拙，取得成功；懶惰的人，縱使天賦異稟，也終將荒廢才華，一事無成。', method: '正反論證' },
            { text: '誠實守信能贏得他人的尊重與信任；虛偽欺詐則會損害自己的名譽，最終眾叛親離。', method: '正反論證' },
            { text: '虛心使人進步，驕傲使人落後。', method: '正反論證' },
            { text: '專心致志地工作，往往能事半功倍；心猿意馬地應付，則往往事倍功半。', method: '正反論證' },
            { text: '誠實的人雖然有時會因為說真話而吃虧，但能贏得長久的尊重；虛偽的人或許能暫時獲得利益，卻終將失去信用，陷入孤立無援的境地。', method: '正反論證' },
            { text: '求學要有恆心才能成功。漢朝的匡衡鑿壁偷光，有恆心地苦讀，終在學問上取得了成就。', method: '舉例論證' },
            { text: '堅持是成功的基石。司馬遷身受酷刑，卻依然忍辱負重，最終寫成了被譽為「史家之絕唱」的《史記》。', method: '舉例論證' },
            { text: '非凡的成就來自於日積月累的苦練。王羲之練習書法極其勤奮，他每天在池邊練字，久而久之，竟將一池清水都洗成了墨色。', method: '舉例論證' },
            { text: '晉代車胤家貧沒錢買油燈，夏夜便捕捉數十隻螢火蟲放在布袋中，藉著微光刻苦讀書，最終成為一代名臣。這證明環境艱苦並不能阻礙有志之士的成功。', method: '舉例論證' }
        ];

        const byMethod = {
            '比喻論證': allSentences.filter(s => s.method === '比喻論證'),
            '引用論證': allSentences.filter(s => s.method === '引用論證'),
            '正反論證': allSentences.filter(s => s.method === '正反論證'),
            '舉例論證': allSentences.filter(s => s.method === '舉例論證')
        };

        function pickSome(arr, count, usedSet) {
            let result = [];
            let available = arr.filter(item => !usedSet.has(item));
            for (let i = 0; i < count; i++) {
                if (available.length === 0) break;
                const idx = Math.floor(Math.random() * available.length);
                result.push(available[idx]);
                usedSet.add(available[idx]);
                available.splice(idx, 1);
            }
            return result;
        }

        const usedInGroup = new Set();

        let group2Raw = [
            ...pickSome(byMethod['比喻論證'], 2, usedInGroup),
            ...pickSome(byMethod['引用論證'], 2, usedInGroup),
            ...pickSome(byMethod['正反論證'], 3, usedInGroup),
            ...pickSome(byMethod['舉例論證'], 2, usedInGroup)
        ];
        let group3Raw = [
            ...pickSome(byMethod['比喻論證'], 3, usedInGroup),
            ...pickSome(byMethod['引用論證'], 2, usedInGroup),
            ...pickSome(byMethod['正反論證'], 2, usedInGroup),
            ...pickSome(byMethod['舉例論證'], 2, usedInGroup)
        ];

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        group2Raw = shuffle(group2Raw);
        group3Raw = shuffle(group3Raw);
        const group1Raw = shuffle([...group2Raw]);

        const groups = {
            1: { name: '第一組 · 示範', sentences: group1Raw, currentIndex: 0, total: 9, isPaused: false, timer: null, seconds: 0 },
            2: { name: '第二組', sentences: group2Raw, currentIndex: 0, total: 9, isPaused: false, timer: null, seconds: 0 },
            3: { name: '第三組', sentences: group3Raw, currentIndex: 0, total: 9, isPaused: false, timer: null, seconds: 0 }
        };

        let currentGroup = 1;
        let gameActive = false;
        let timerInterval = null;
        let waitingForContinue = false;

        const groupNameEl = document.getElementById('groupName');
        const timerDisplay = document.getElementById('timerDisplay');
        const sentenceText = document.getElementById('sentenceText');
        const sentenceBox = document.getElementById('sentenceBox');
        const feedbackOverlay = document.getElementById('feedbackOverlay');
        const pauseBanner = document.getElementById('pauseBanner');
        const continueBtn = document.getElementById('continueBtn');
        const startGroupBtn = document.getElementById('startGroupBtn');
        const progressDisplay = document.getElementById('progressDisplay');
        const argBtns = document.querySelectorAll('.arg-btn');
        const plusTenMsg = document.getElementById('plusTenMsg');

        let plusTenTimer = null;

        function showPlusTen() {
            if (plusTenTimer) clearTimeout(plusTenTimer);
            plusTenMsg.classList.add('show');
            plusTenTimer = setTimeout(() => {
                plusTenMsg.classList.remove('show');
            }, 500);
        }

        function formatTime(sec) {
            let m = Math.floor(sec / 60).toString().padStart(2, '0');
            let s = Math.floor(sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function startTimerForGroup(group) {
            if (timerInterval) stopTimer();
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                let g = groups[currentGroup];
                g.seconds++;
                timerDisplay.textContent = formatTime(g.seconds);
            }, 1000);
        }

        function refreshUI() {
            const g = groups[currentGroup];
            groupNameEl.textContent = g.name;
            timerDisplay.textContent = formatTime(g.seconds);
            const idx = g.currentIndex;
            if (idx < g.total) {
                sentenceText.textContent = g.sentences[idx].text;
                progressDisplay.textContent = `${idx+1} / ${g.total}`;
            } else {
                sentenceText.textContent = '本組已完成！點擊下方開始下一組。';
                progressDisplay.textContent = `9 / 9`;
                gameActive = false;
                stopTimer();
            }
            if (gameActive && !waitingForContinue) {
                argBtns.forEach(btn => btn.classList.remove('disabled'));
            } else {
                argBtns.forEach(btn => btn.classList.add('disabled'));
            }
            if (currentGroup === 1 && waitingForContinue) {
                pauseBanner.classList.remove('hidden');
                continueBtn.classList.remove('hidden');
            } else {
                pauseBanner.classList.add('hidden');
                continueBtn.classList.add('hidden');
            }
        }

        function activateGroup(groupNum) {
            if (timerInterval) stopTimer();
            const g = groups[groupNum];
            g.currentIndex = 0;
            g.seconds = 0;
            g.isPaused = false;
            waitingForContinue = false;
            gameActive = true;
            startTimerForGroup(groupNum);
            refreshUI();
            feedbackOverlay.classList.add('hidden');
            feedbackOverlay.innerHTML = '';
        }

        function nextQuestion() {
            const g = groups[currentGroup];
            if (g.currentIndex + 1 < g.total) {
                g.currentIndex++;
                refreshUI();
                feedbackOverlay.classList.add('hidden');
                feedbackOverlay.innerHTML = '';
            } else {
                g.currentIndex = g.total;
                gameActive = false;
                stopTimer();
                refreshUI();
                feedbackOverlay.classList.add('hidden');
                if (currentGroup < 3) {
                    startGroupBtn.textContent = `開始 第${currentGroup+1}組`;
                } else {
                    startGroupBtn.textContent = '所有組完成 🎉';
                    startGroupBtn.disabled = true;
                }
            }
        }

        function scatterPetalFromButton(btnRect) {
            for (let i=0; i<12; i++) {
                const petal = document.createElement('span');
                petal.className = 'petal';
                petal.textContent = '🌸';
                petal.style.left = (btnRect.left + window.scrollX + Math.random()*60 - 30) + 'px';
                petal.style.top = (btnRect.top + window.scrollY - 10 + Math.random()*30) + 'px';
                petal.style.fontSize = (2 + Math.random()*2) + 'rem';
                petal.style.animationDuration = (0.5 + Math.random()*0.3) + 's';
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 1000);
            }
        }

        function handleMethodClick(event) {
            const btn = event.currentTarget;
            if (!gameActive || waitingForContinue) return;

            const selectedMethod = btn.dataset.method;
            const g = groups[currentGroup];
            const currentSentenceObj = g.sentences[g.currentIndex];
            const correctMethod = currentSentenceObj.method;

            const rect = btn.getBoundingClientRect();
            scatterPetalFromButton(rect);

            // ---------- 答錯懲罰：+10秒 (任何組別都生效) ----------
            // 但我們只在答錯時加秒，答對不加
            if (selectedMethod !== correctMethod) {
                g.seconds += 10;
                timerDisplay.textContent = formatTime(g.seconds);
                showPlusTen();
            }

            feedbackOverlay.classList.remove('hidden');
            feedbackOverlay.innerHTML = '';

            if (selectedMethod === correctMethod) {
                // 答對
                sentenceText.classList.add('hidden');
                feedbackOverlay.innerHTML = `<div class="big-emojis">🌸🌸🌸 答對了 🌸🌸🌸</div>`;
                const boxRect = sentenceBox.getBoundingClientRect();
                for (let i=0; i<18; i++) {
                    const petal = document.createElement('span');
                    petal.className = 'petal';
                    petal.textContent = '🌸';
                    petal.style.left = (boxRect.left + window.scrollX + Math.random()*boxRect.width) + 'px';
                    petal.style.top = (boxRect.top + window.scrollY + Math.random()*30) + 'px';
                    petal.style.animationDuration = (0.5 + Math.random()*0.4) + 's';
                    document.body.appendChild(petal);
                    setTimeout(() => petal.remove(), 900);
                }
                setTimeout(() => {
                    sentenceText.classList.remove('hidden');
                    nextQuestion();
                }, 400);
            } else {
                // 答錯 (秒數已加)
                sentenceText.classList.remove('hidden');
                feedbackOverlay.innerHTML = `<div style="font-size:5rem;">❌</div>
                                             <div class="wrong-msg">回答錯誤，正確答案是：${correctMethod}</div>`;
                if (currentGroup === 1) {
                    // 第一組暫停，句子保持可見
                    gameActive = false;
                    waitingForContinue = true;
                    stopTimer();
                    refreshUI();  // 顯示暫停橫幅，停用按鈕
                } else {
                    // 第二、三組：顯示錯誤後跳下一題
                    setTimeout(() => {
                        feedbackOverlay.classList.add('hidden');
                        nextQuestion();
                    }, 1200);
                }
            }
        }

        continueBtn.addEventListener('click', () => {
            if (currentGroup === 1 && waitingForContinue) {
                waitingForContinue = false;
                gameActive = true;
                startTimerForGroup(groups[1]);
                refreshUI();
                feedbackOverlay.classList.add('hidden');
                sentenceText.classList.remove('hidden');
            }
        });

        startGroupBtn.addEventListener('click', () => {
            if (currentGroup < 3) {
                if (groups[currentGroup].currentIndex >= groups[currentGroup].total) {
                    currentGroup++;
                }
                activateGroup(currentGroup);
                if (currentGroup === 1) startGroupBtn.textContent = '重新開始第一組';
                else if (currentGroup === 2) startGroupBtn.textContent = '重新開始第二組';
                else if (currentGroup === 3) startGroupBtn.textContent = '重新開始第三組';
            } else {
                startGroupBtn.disabled = true;
            }
        });

        argBtns.forEach(btn => btn.addEventListener('click', handleMethodClick));

        // 初始界面
        groupNameEl.textContent = '第一組 · 示範';
        sentenceText.textContent = groups[1].sentences[0].text;
        progressDisplay.textContent = `1 / 9`;
        timerDisplay.textContent = '00:00';
        gameActive = false;
        argBtns.forEach(btn => btn.classList.add('disabled'));
    })();
</script>
</body>
</html>
